name: Update GamePrep Data
on:
  schedule:
    - cron: '0 3 */2 * *' # Every 48 hours at 4 AM London (3 AM UTC)
  workflow_dispatch:

jobs:
  update-matches:
    runs-on: ubuntu-latest
    permissions:
      contents: write
      
    steps:
      - name: Checkout Repository
        uses: actions/checkout@v4

      - name: Set up Node.js
        uses: actions/setup-node@v4
        with:
          node-version: '18'

      - name: Install Scraper Dependencies
        working-directory: ./FlashscoreScraping
        run: |
          npm install
          npx playwright install chromium --with-deps

      - name: Run Flashscore Scraper
        working-directory: ./FlashscoreScraping
        run: node src/index.js country=portugal headless=true fileType=json

      - name: Set up Python
        uses: actions/setup-python@v5
        with:
          python-version: '3.10'

      - name: Run Matching Script
        run: python3 match_locations.py

      - name: Prepare Dashboard Data
        run: |
          mkdir -p dashboard/src/data
          cp matches_with_stores.json dashboard/src/data/matches.json

      - name: Commit and Push Changes
        uses: stefanzweifel/git-auto-commit-action@v5
        with:
          commit_message: "chore: automatic update of match data [skip ci]"
          file_pattern: "dashboard/src/data/matches.json"
          commit_user_name: "GitHub Action"
          commit_user_email: "action@github.com"
          commit_author: "GitHub Action <action@github.com>"
